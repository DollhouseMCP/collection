name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$REF_NAME"
          fi
          
          # Validate version format
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Version must be in format: vX.Y.Z"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION"

      - name: Check CHANGELOG
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! grep -q "$RELEASE_VERSION" CHANGELOG.md; then
            echo "⚠️ Warning: Version $RELEASE_VERSION not found in CHANGELOG.md"
          fi

  build-release:
    name: Build Release
    needs: validate-release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:all

      - name: Build project
        run: npm run build

      - name: Package release
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          # Create release directory
          mkdir -p release

          # Copy distribution files
          cp -r dist release/
          cp package.json release/
          cp package-lock.json release/
          cp README.md release/
          cp LICENSE release/
          cp LICENSE-CONTENT release/

          # Create tarball
          tar -czf "dollhousemcp-collection-${RELEASE_VERSION}-ubuntu.tar.gz" release/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ubuntu
          path: "*.tar.gz"
          retention-days: 1

  create-github-release:
    name: Create GitHub Release
    needs: [validate-release, build-release]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Generate release notes
        id: release-notes
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          VERSION="$RELEASE_VERSION"
          
          # Extract changelog section for this version
          cat > release-notes.md << EOF
          # DollhouseMCP Collection $VERSION
          
          ## 📦 Browse Collection
          
          Browse the collection at: https://github.com/DollhouseMCP/collection
          
          ## 🚀 What's New
          
          EOF
          
          # Try to extract from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            awk "/## $VERSION/,/## v[0-9]/" CHANGELOG.md | head -n -1 >> release-notes.md || echo "See CHANGELOG.md for details." >> release-notes.md
          else
            echo "See commit history for changes." >> release-notes.md
          fi
          
          cat >> release-notes.md << EOF
          
          ## 📊 Quality Metrics
          
          - ✅ All tests passing on Ubuntu
          - 🔒 Security scan completed
          - 📈 Performance benchmarks available
          
          ## 📥 Downloads
          
          Platform-specific builds are attached below.
          EOF

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.validate-release.outputs.version }}
          name: ${{ needs.validate-release.outputs.version }}
          bodyFile: release-notes.md
          artifacts: "*.tar.gz"
          draft: true
          prerelease: ${{ contains(needs.validate-release.outputs.version, '-') }}
